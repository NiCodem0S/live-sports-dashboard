services:
  - type: web
    name: live-sports-dashboard
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: TRUSTED_PROXIES
        value: 127.0.0.1
